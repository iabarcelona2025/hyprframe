                <a href="index.html" class="logo">

        <div class="burger-menu" id="burgerMenu">

            <div class="burger-line"></div>
            <div class="burger-line"></div>
        </div>

        <div class="mobile-nav" id="mobileNav">
            <ul>
                <li><a href="index.html#ai%20Generated">AI Generated</a></li>
                <li><a href="#">Captured</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>

        <main>
            <section class="intro-section">
                <p class="intro-subtitle">CAPTURED WORKS</p>

            <div class="portfolio-grid">
                <a href="#" class="portfolio-item" data-video="video1">

                <a href="#" class="portfolio-item" data-video="video2">
                    <img src="assets/images/duelo.jpg" alt="Work 2" />

                <a href="#" class="portfolio-item" data-video="video3">
                    <img src="assets/images/insert03.jpg" alt="Work 3" />
                </a>
                <a href="#" class="portfolio-item" data-video="video4">
                    <img src="assets/images/spark.jpg" alt="Work 4" />
                </a>
                <a href="#" class="portfolio-item" data-video="video5">
                    <img src="assets/images/insert02.jpg" alt="Work 5" />

        </main>
        
        <footer class="footer-bottom">

        </footer>
        
        <div id="videoModal" class="video-modal">
            <div class="video-modal-content">
                <span class="close">&times;</span>
                <div class="video-wrapper">
                    <iframe
                        id="vimeoPlayer"
                        src=""
                        frameborder="0"
                        allow="autoplay; fullscreen"
                        allowfullscreen
                    ></iframe>
                </div>
                <div class="video-description"><p id="videoSynopsis"></p></div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // --- 1. MOTOR DE LAS BANDAS (LEE EL CSS Y FUERZA EL MOVIMIENTO) ---
                const strips = document.querySelectorAll(".strip");

                if (strips.length > 0) {
                    const stripsConfig = Array.from(strips).map((strip) => {
                        const styles = getComputedStyle(strip);
                        return {
                            el: strip,
                            speed:
                                parseFloat(
                                    styles.getPropertyValue("--speed"),
                                ) || 0.25,
                            angle:
                                styles.getPropertyValue("--angle").trim() ||
                                "0deg",
                        };
                    });

                    function updateParallax() {
                        const scrollPos =
                            window.pageYOffset ||
                            window.scrollY ||
                            document.documentElement.scrollTop ||
                            document.body.scrollTop ||
                            0;

                        stripsConfig.forEach((strip) => {
                            const moveY = scrollPos * strip.speed;
                            strip.el.style.setProperty(
                                "transform",
                                `translate3d(0px, -${moveY}px, 0px) rotate(${strip.angle})`,
                                "important",
                            );
                        });
                    }

                    window.addEventListener(
                        "scroll",
                        () => {
                            requestAnimationFrame(updateParallax);
                        },
                        { passive: true },
                    );

                    updateParallax();
                }

                // --- GESTIÓN DEL MENÚ MÓVIL ---
                const burger = document.getElementById("burgerMenu");
                const mobileNav = document.getElementById("mobileNav");

                if (burger && mobileNav) {
                    burger.addEventListener("click", () => {
                        burger.classList.toggle("active");
                        mobileNav.classList.toggle("active");
                        document.body.classList.toggle("menu-open");
                    });

                    mobileNav.querySelectorAll("a").forEach((link) => {
                        link.addEventListener("click", () => {
                            burger.classList.remove("active");
                            mobileNav.classList.remove("active");
                            document.body.classList.remove("menu-open");
                        });
                    });

                    document.addEventListener("click", (e) => {
                        if (
                            !burger.contains(e.target) &&
                            !mobileNav.contains(e.target)
                        ) {
                            burger.classList.remove("active");
                            mobileNav.classList.remove("active");
                            document.body.classList.remove("menu-open");
                        }
                    });
                }

                // --- 2. MODAL DE VIDEO ---
                const modal = document.getElementById("videoModal");
                const iframe = document.getElementById("vimeoPlayer");
                const synopsis = document.getElementById("videoSynopsis");

                const videos = {
                    video1: {
                        url: "https://player.vimeo.com/video/1131285757",
                        text: "INSERT SEASON 5: Sounds frozen in time.",
                    },
                    video2: {
                        url: "https://player.vimeo.com/video/265730118",
                        text: "BRUBAKER CO: Nose duel.",
                    },
                    video3: {
                        url: "https://player.vimeo.com/video/1131285727",
                        text: "INSERT SEASON 3: What you can't see.",
                    },
                    video4: {
                        url: "https://player.vimeo.com/video/1131285709",
                        text: "Chevrolet Spark: Get Inspired.",
                    },
                    video5: {
                        url: "https://player.vimeo.com/video/1131285681",
                        text: "INSERT 2.0: The Sunday.",
                    },
                    video6: {
                        url: "https://player.vimeo.com/video/21087707",
                        text: "Dácil: Groc Music Video.",
                    },
                };

                document.querySelectorAll(".portfolio-item").forEach((item) => {
                    item.addEventListener("click", (e) => {
                        e.preventDefault();
                        const id = item.getAttribute("data-video");
                        if (videos[id]) {
                            iframe.src = videos[id].url + "?autoplay=1";
                            synopsis.innerText = videos[id].text;
                            modal.style.display = "flex";
                        }
                    });
                });

                document.querySelector(".close").onclick = () => {
                    modal.style.display = "none";
                    iframe.src = "";
                };

                window.onclick = (e) => {
                    if (e.target == modal) {
                        modal.style.display = "none";
                        iframe.src = "";
                    }
                };

                // --- 3. SENSOR DE HOVER PARA DESATURAR LAS BANDAS ---
                const portfolioGrid = document.querySelector(".portfolio-grid");

                if (portfolioGrid) {
                    // Cuando el ratón ENTRA en la caja del grid, encendemos el modo gris
                    portfolioGrid.addEventListener("mouseenter", () => {
                        document.body.classList.add("desaturate-strips");
                    });

                    // Cuando el ratón SALE del grid, apagamos el modo gris
                    portfolioGrid.addEventListener("mouseleave", () => {
                        document.body.classList.remove("desaturate-strips");
                    });
                }
            }); // Y AQUÍ CERRAMOS TODO CORRECTAMENTE
        </script>
    </body>
</html>
